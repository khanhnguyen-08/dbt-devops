# This is a basic workflow to help you get started with Actions

name: dbt-cicd-pipline

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches:
      - main
      - feat/**
  pull_request:
    branches:
      - main
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

env:
  DEVELOPER: "Justin"
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  DBT_PROJECT_NAME: demo

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  dbt-ci:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    environment: dev

    env:
      MY_ENVIRONMENT: dev

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Greetings
        run: echo "Hello DevOps!! My name is $DEVELOPER"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      
      - name: Setup Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Dbt Debug
        working-directory: ${{ env.DBT_PROJECT_NAME }}
        run: dbt debug

      - name: Dbt Deps
        working-directory: ${{ env.DBT_PROJECT_NAME }}
        run: dbt deps

      - name: Dbt Compile
        working-directory: ${{ env.DBT_PROJECT_NAME }}
        run: dbt compile --target ${{ env.MY_ENVIRONMENT }}

      - name: Dbt Run
        working-directory: ${{ env.DBT_PROJECT_NAME }}
        run: dbt run

      - name: Dbt Test
        working-directory: ${{ env.DBT_PROJECT_NAME }}
        run: dbt test

      - name: Dbt Documentation
        working-directory: ${{ env.DBT_PROJECT_NAME }}
        run: dbt docs generate
  
  dbt-deploy-to-dev:
    needs:
      - dbt-ci
    runs-on: ubuntu-latest
    environment: dev
    env:
      CURRENT_ENV: dev

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2
      
      - name: Upload dbt Project to Amazon S3 Bucket
        run: |
          aws s3 sync ${{ env.DBT_PROJECT_NAME }} s3://${{ env.DBT_PROJECT_S3_BUCKET }}/${{ env.CURRENT_ENV }} \
            --delete
  
  dbt-deploy-to-tst:
    needs:
      - dbt-deploy-to-dev
    runs-on: ubuntu-latest
    environment: dev
    env:
      CURRENT_ENV: tst

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2
      
      - name: Upload dbt Project to Amazon S3 Bucket
        run: |
          aws s3 sync ${{ env.DBT_PROJECT_NAME }} s3://${{ env.DBT_PROJECT_S3_BUCKET }}/${{ env.CURRENT_ENV }} \
            --delete
  
  
  manual-approval-gate:
    needs:
      - dbt-deploy-to-tst
    runs-on: ubuntu-latest
    environment: dev
    env:
      CURRENT_ENV: tst

    steps:
      - uses: actions/checkout@v4

      - name: Auto Approval
        run: echo "Approved by $DEVELOPER""


  dbt-deploy-to-prd:
    needs:
      - manual-approval-gate
    runs-on: ubuntu-latest
    environment: dev
    env:
      CURRENT_ENV: prd

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2
      
      - name: Upload dbt Project to Amazon S3 Bucket
        run: |
          aws s3 sync ${{ env.DBT_PROJECT_NAME }} s3://${{ env.DBT_PROJECT_S3_BUCKET }}/${{ env.CURRENT_ENV }} \
            --delete